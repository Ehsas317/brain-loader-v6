#
# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  MESH   — FILE: wave.yml                                                ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# PROJECT:    Mesh (formerly Brain Loader v6)
# REPO:       https://github.com/Ehsas317/mesh
# WHAT:       A network of nodes, not a single engine. Dockerized multi-node
#             orchestration with Docker Compose mesh.
#
# THIS FILE:
#   GitHub Actions workflow for cloud execution. Move to .github/workflows/
#   to enable. FREE: 2,000 minutes/month (~33 hours of cloud compute).
#
# HOW TO USE:
#   1. mkdir -p .github/workflows && mv wave.yml .github/workflows/
#   2. git add .github/workflows/wave.yml && git commit && git push
#   3. Go to GitHub → Actions → "Mesh Wave Execution" → "Run workflow"
#   4. Enter your goal and click "Run"
#
# ═══════════════════════════════════════════════════════════════════════════

name: Mesh Wave Execution

on:
  workflow_dispatch:
    inputs:
      goal:
        description: 'What should the mesh do?'
        required: true
        type: string

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready!"
              break
            fi
            echo "Attempt $i/30..." >&2
            sleep 2
          done
          ollama pull llama3.2

      - name: Execute Goal
        env:
          BRAIN_GOAL: ${{ github.event.inputs.goal }}
        run: |
          echo "## 🧠 Mesh Input" >> $GITHUB_STEP_SUMMARY
          echo "${BRAIN_GOAL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🤖 AI Response" >> $GITHUB_STEP_SUMMARY
          ollama run llama3.2 "${BRAIN_GOAL}" 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY
