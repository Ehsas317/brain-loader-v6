# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# PROJECT:    Mesh (formerly Brain Loader v6)
# REPO:       https://github.com/Ehsas317/mesh
# WHAT:       A network of nodes, not a single engine. Dockerized multi-node
#             orchestration with Docker Compose mesh.
#
# THIS FILE:
#   WhatsApp Business API overlay. Connects your Dify brain to WhatsApp.
#
# HOW TO USE:
#   cd ~/mesh && docker compose -f docker-compose.yml -f docker-compose.whatsapp.yml up -d
#
# ═══════════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  whatsapp-api:
    image: whatsapp/business-api:latest
    container_name: mesh-whatsapp
    ports:
      - "5002:5002"
    environment:
      - WA_API_PORT=5002
      - WA_API_HOST=0.0.0.0
      - WA_API_ENDPOINT=http://mesh-dify-api:5001
    networks:
      - mesh-net
    restart: unless-stopped

# This overlay extends the mesh-net network from docker-compose.yml
networks:
  mesh-net:
    external: true
