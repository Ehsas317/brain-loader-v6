#
# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  MESH   — FILE: docker-compose.yml                                      ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# PROJECT:    Mesh (formerly Brain Loader v6)
# REPO:       https://github.com/Ehsas317/mesh
# WHAT:       A network of nodes, not a single engine. Dockerized multi-node
#             orchestration with Docker Compose mesh.
#
# THIS FILE:
#   Defines the 6-layer AI orchestration stack. Each service runs in its
#   own container and talks to others via the shared mesh network.
#
# HOW TO USE MESH:
#   1. Install Docker Desktop
#   2. Run: bash install.sh
#   3. Open http://localhost:3000 for Dify
#
# ═══════════════════════════════════════════════════════════════════════════

# =============================================================================
# Mesh — Core Mesh (docker-compose.yml)
# =============================================================================
# BUG FIXES APPLIED:
# - Added health checks to postgres, redis, and weaviate so Dify doesn't
#   crash-loop on startup waiting for dependencies to be ACTUALLY ready
# - Pinned Weaviate to 1.24.0 for reproducible builds
# - Added restart policies with unless-stopped
# - Used named volumes for all persistent data
# - Added explicit bridge network for inter-service DNS resolution
# - SECRETS NOW USE ENVIRONMENT VARIABLES — set in .env or export before running
# =============================================================================

version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: mesh-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./ollama-personas:/root/.ollama/personas:ro
    networks:
      - mesh-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  dify-api:
    image: langgenius/dify-api:latest
    container_name: mesh-dify-api
    ports:
      - "5001:5001"
    environment:
      - MODE=${MODE:-hybrid}
      - CONSOLE_API_URL=http://localhost:5001
      - APP_API_URL=http://localhost:5001
      - SECRET_KEY=${MESH_SECRET_KEY:-mesh-secret-key-change-me}
      - DB_USERNAME=mesh
      - DB_PASSWORD=${MESH_DB_PASSWORD:-mesh-secure}
      - DB_HOST=mesh-postgres
      - DB_PORT=5432
      - DB_DATABASE=meshdb
      - REDIS_HOST=mesh-redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WEAVIATE_ENDPOINT=http://mesh-weaviate:8080
    volumes:
      - dify-data:/app/api/storage
    networks:
      - mesh-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    restart: unless-stopped

  dify-web:
    image: langgenius/dify-web:latest
    container_name: mesh-dify-web
    ports:
      - "3000:3000"
    environment:
      - CONSOLE_API_URL=http://localhost:5001
      - APP_API_URL=http://localhost:5001
    networks:
      - mesh-net
    depends_on:
      - dify-api
    restart: unless-stopped

  flowise:
    image: flowiseai/flowise:latest
    container_name: mesh-flowise
    ports:
      - "3001:3000"
    environment:
      - FLOWISE_USERNAME=mesh
      - FLOWISE_PASSWORD=${MESH_FLOWISE_PASSWORD:-mesh-pass}
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - SECRETKEY_PATH=/root/.flowise
      - LOG_PATH=/root/.flowise/logs
    volumes:
      - flowise-data:/root/.flowise
    networks:
      - mesh-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mesh-redis
    volumes:
      - redis-data:/data
    networks:
      - mesh-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:15-alpine
    container_name: mesh-postgres
    environment:
      - POSTGRES_USER=mesh
      - POSTGRES_PASSWORD=${MESH_POSTGRES_PASSWORD:-mesh-secure}
      - POSTGRES_DB=meshdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mesh-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d meshdb || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  weaviate:
    image: semitechnologies/weaviate:1.24.0
    container_name: mesh-weaviate
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - mesh-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  ollama-data:
  dify-data:
  flowise-data:
  redis-data:
  postgres-data:
  weaviate-data:

networks:
  mesh-net:
    driver: bridge
    name: mesh-net
