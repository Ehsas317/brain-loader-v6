#
# PROJECT:    Mesh (formerly Brain Loader v6)
# REPO:       https://github.com/Ehsas317/mesh
# WHAT:       A network of nodes, not a single engine. Dockerized multi-node
#             orchestration with Docker Compose mesh.
#
# THIS FILE:
#   Hermes Agent configuration template. Copy to ~/.hermes/config.yaml
#   and customize. Hermes provides 118+ built-in skills.
#
# ═══════════════════════════════════════════════════════════════════════════

# Hermes Agent Configuration
# https://github.com/NousResearch/hermes-agent

# Ollama connection
ollama:
  host: "http://mesh-ollama:11434"
  model: "mesh-planner"

# Skills directory
skills_dir: "~/.hermes/skills"

# Dify integration
dify:
  api_url: "http://mesh-dify-api:5001"
  # Add your Dify API key after setup

# Logging
log_level: "INFO"
log_file: "~/.hermes/logs/hermes.log"

# Default agent settings
agent:
  max_iterations: 10
  temperature: 0.7
  max_tokens: 4096

# Memory
memory:
  backend: "weaviate"
  weaviate_url: "http://mesh-weaviate:8080"
