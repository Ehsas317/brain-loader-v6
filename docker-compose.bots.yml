#
# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  MESH   — FILE: docker-compose.bots.yml                                 ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# PROJECT:    Mesh (formerly Brain Loader v6)
# REPO:       https://github.com/Ehsas317/mesh
# WHAT:       A network of nodes, not a single engine. Dockerized multi-node
#             orchestration with Docker Compose mesh.
#
# THIS FILE:
#   Bot Gateway overlay for LangBot. Connects your Dify brain to
#   Telegram, Discord, Slack, and more.
#
# HOW TO USE:
#   cd ~/mesh && docker compose -f docker-compose.yml -f docker-compose.bots.yml up -d
#
# ═══════════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  langbot:
    image: langbot/langbot:latest
    container_name: mesh-langbot
    ports:
      - "5300:5300"
    volumes:
      - langbot-data:/app/data
    networks:
      - mesh-net
    restart: unless-stopped

volumes:
  langbot-data:

# This overlay extends the mesh-net network from docker-compose.yml
networks:
  mesh-net:
    external: true
