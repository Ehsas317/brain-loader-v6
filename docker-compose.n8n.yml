#
# PROJECT:    Mesh (formerly Brain Loader v6)
# REPO:       https://github.com/Ehsas317/mesh
# WHAT:       A network of nodes, not a single engine. Dockerized multi-node
#             orchestration with Docker Compose mesh.
#
# THIS FILE:
#   n8n automation overlay. Visual workflow builder for connecting
n#   your Dify brain to any platform.
#
# HOW TO USE:
#   cd ~/mesh && docker compose -f docker-compose.yml -f docker-compose.n8n.yml up -d
#
# ═══════════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: mesh-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=mesh
      - N8N_BASIC_AUTH_PASSWORD=mesh-secure
      - N8N_ENCRYPTION_KEY=mesh-encryption-key-change-me
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=mesh-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=mesh
      - DB_POSTGRESDB_PASSWORD=mesh-secure
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - mesh-net
    restart: unless-stopped

volumes:
  n8n-data:

# This overlay extends the mesh-net network from docker-compose.yml
networks:
  mesh-net:
    external: true
